name: CI/CD Pipeline - Docker Build & Push

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# 환경 변수 설정. DOCKER_USERNAME이 ID 역할을 함
env:
  # 생성될 Docker 이미지 이름 (예: myid/mlops-age-prediction)
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/mlops-age-prediction

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      # 1. 깃허브 저장소(로컬 코드) 체크아웃
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 강력한 캐싱과 멀티 아키텍처 빌드를 지원하는 Docker Buildx 설정
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Docker Hub 로그인 (PR일 경우에는 푸시를 안 할 테니 로그인 건너뜀)
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. 이미지 태그와 라벨을 자동으로 추출 및 할당
      # - main 브랜치일 경우 'latest' 태그 부여
      # - 그 외 모든 커밋에 대해 짧은 커밋 해시(sha) 태그 부여 (버전 관리 용이)
      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      # 5. 최적화된 Docker 이미지 빌드 및 푸시 액션
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Push 이벤트일 경우에만 실제 Docker Hub에 Push 수행 (PR일 땐 Build 테스트만 수행)
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions 자체 캐시 시스템을 활용하여, 다음 빌드 시 파이썬 종속성 설치 시간 단축
          cache-from: type=gha
          cache-to: type=gha,mode=max
